<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #0f172a;
      color: white;
    }
    h2 {
      margin-top: 0;
      color: #38bdf8;
      font-size: 1.2rem;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.8rem;
      opacity: 0.8;
    }
    input {
      width: 100%;
      padding: 8px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      color: white;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #0ea5e9;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 10px;
    }
    button:hover {
      background: #0284c7;
    }
    .status {
      margin-top: 10px;
      font-size: 0.75rem;
      text-align: center;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <h2>CoinFlow Settings</h2>
  <div class="form-group">
    <label>CoinFlow Server URL</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:3000">
  </div>
  <div class="form-group">
    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="Enter API Key">
  </div>
  <button id="save">Save Configuration</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
