version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: budgetuser
      POSTGRES_PASSWORD: budgetpassword
      POSTGRES_DB: webbudget
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - 'backups:/app/backups'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://budgetuser:budgetpassword@db:5432/webbudget
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-supersecret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      APP_PASSWORD: ${APP_PASSWORD:-admin}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://ollama.castertr0y357.net/v1}
      AI_MODEL: ${AI_MODEL:-gemma4:e4b}
    depends_on:
      - db

volumes:
  postgres_data:
  backups:
